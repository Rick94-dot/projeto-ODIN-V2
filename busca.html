<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ODIN · Buscar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --indigo-900:#0f1a3d;
    --indigo-800:#162455;
    --indigo-700:#1f3273;
    --indigo-600:#2a4399;
    --indigo-500:#3858c4;
    --indigo-400:#6685dd;
    --sakura-800:#8a3a4e;
    --sakura-700:#b4546b;
    --sakura-500:#e891a9;
    --sakura-400:#f1a8be;
    --sakura-300:#f8c8d4;
    --sakura-200:#fce0e6;
    --sakura-100:#fbeef1;
    --ink:#1a1d2b;
    --ink-soft:#5b5f72;
    --ink-mute:#9396a5;
    --paper:#faf7f2;
    --paper-2:#f3ede3;
    --line:#e7e1d3;
    --line-soft:#efeadd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:"DM Sans",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 700px at -10% -10%, #fff 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 110%, var(--paper-2) 0%, transparent 60%),
      var(--paper);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    /* subtle paper grain */
    content:"";
    position:fixed;inset:0;
    background-image:
      radial-gradient(rgba(26,29,43,.035) 1px, transparent 1px),
      radial-gradient(rgba(26,29,43,.022) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    pointer-events:none;
    mix-blend-mode:multiply;
    opacity:.55;
    z-index:0;
  }

  /* Decorative sakura branches in two corners */
  .deco{
    position:fixed;pointer-events:none;z-index:0;
  }
  .deco.tl{ top:-50px;left:-60px; width:280px;height:280px; opacity:.45; }
  .deco.br{ bottom:-60px;right:-70px; width:300px;height:300px; opacity:.4; transform:rotate(180deg); }

  /* user chip top-right */
  .user-chip{
    position:fixed;top:24px;right:32px;z-index:5;
    display:flex;align-items:center;gap:12px;
    padding:8px 14px 8px 8px;
    background:rgba(255,255,255,.55);
    border:1px solid var(--line);
    backdrop-filter:blur(4px);
  }
  .user-chip .av{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg, var(--indigo-700), var(--sakura-700));
    color:#fff;
    display:grid;place-items:center;
    font-family:"Cormorant Garamond",serif;
    font-size:14px;font-weight:600;
    letter-spacing:.04em;
  }
  .user-chip .t{display:flex;flex-direction:column;line-height:1.15}
  .user-chip .n{font-size:12.5px;font-weight:500;color:var(--ink)}
  .user-chip .r{
    font-family:"JetBrains Mono",monospace;
    font-size:9px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-mute);margin-top:2px;
  }

  /* tag corner */
  .corner-tag{
    position:fixed;top:24px;left:32px;z-index:5;
    font-family:"JetBrains Mono",monospace;
    font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--indigo-900);
    border:1px solid var(--line);
    padding:8px 14px;
    background:rgba(255,255,255,.5);
    display:flex;align-items:center;gap:10px;
  }
  .corner-tag .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--sakura-500);
    box-shadow:0 0 0 4px rgba(232,145,169,.18);
  }

  /* ========== MAIN ========== */
  .stage{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:120px 24px 80px;
  }
  .center{
    width:min(720px, 100%);
    display:flex;flex-direction:column;align-items:center;
    text-align:center;
    transition:width .4s ease;
  }
  .center.expanded{
    width:min(860px, 100%);
  }

  /* Logo block */
  .logo-block{
    display:flex;flex-direction:column;align-items:center;
    margin-bottom:44px;
    opacity:0;transform:translateY(12px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .05s forwards;
  }
  .logo-block img{
    width:180px;height:180px;
    object-fit:contain;
    display:block;
    filter: drop-shadow(0 12px 28px rgba(15,26,61,.22));
  }
  .logo-block .wordmark{
    font-family:"Cormorant Garamond",serif;
    font-weight:600;
    letter-spacing:.48em;
    font-size:36px;
    color:var(--indigo-900);
    margin-top:18px;
    padding-left:.48em;
    line-height:1;
  }
  .logo-block .wordmark span{
    color:var(--sakura-700);
    margin:0 -.05em;
  }
  .logo-block .tagline{
    font-family:"DM Sans",sans-serif;
    font-weight:400;
    font-size:11.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:16px;
    display:flex;align-items:center;gap:12px;
    white-space:nowrap;
  }
  .logo-block .tagline::before,.logo-block .tagline::after{
    content:"";flex:0 0 22px;height:1px;background:var(--line);
  }

  /* Search */
  .search-wrap{
    width:100%;
    opacity:0;transform:translateY(12px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .25s forwards;
  }
  .search{
    position:relative;
    width:100%;
  }
  .search input{
    width:100%;
    height:64px;
    padding:0 64px 0 60px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.65);
    border-radius:2px;
    font:400 16px/1 "DM Sans",sans-serif;
    color:var(--ink);
    outline:none;
    transition:border-color .25s ease, box-shadow .25s ease, background .25s ease;
    box-shadow: 0 12px 30px -16px rgba(15,26,61,.18);
  }
  .search input::placeholder{color:var(--ink-mute);font-weight:400}
  .search input:focus{
    border-color:var(--indigo-700);
    background:#fff;
    box-shadow: 0 0 0 4px rgba(31,50,115,.08), 0 18px 40px -16px rgba(15,26,61,.25);
  }
  .search .ico-left{
    position:absolute;left:22px;top:50%;transform:translateY(-50%);
    color:var(--ink-mute);
    transition:color .25s ease;
    pointer-events:none;
  }
  .search:focus-within .ico-left{color:var(--indigo-700)}

  .search .go{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    height:46px;padding:0 22px;
    background:var(--indigo-900);
    color:#fff;border:0;cursor:pointer;
    font:500 11px/1 "DM Sans",sans-serif;
    letter-spacing:.22em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:10px;
    transition:background .2s ease, transform .2s ease;
  }
  .search .go:hover{background:var(--indigo-700)}
  .search .go:active{transform:translateY(calc(-50% + 1px))}
  .search .go svg{transition:transform .25s ease}
  .search .go:hover svg{transform:translateX(4px)}

  /* ========== SUGGESTIONS DROPDOWN ========== */
  .suggest{
    position:absolute;
    top:calc(100% + 6px);
    left:0;right:0;
    background:#fff;
    border:1px solid var(--line);
    box-shadow: 0 24px 50px -18px rgba(15,26,61,.28);
    max-height:320px;
    overflow-y:auto;
    z-index:10;
    display:none;
    text-align:left;
  }
  .suggest.open{display:block;animation:rise .25s ease}
  .suggest .empty{
    padding:18px 22px;
    font-size:13px;color:var(--ink-mute);
    font-style:italic;
    text-align:center;
  }
  .suggest .s-head{
    font-family:"JetBrains Mono",monospace;
    font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--ink-mute);
    padding:12px 22px 8px;
    border-bottom:1px solid var(--line-soft);
  }
  .suggest .item{
    padding:13px 22px;
    display:flex;align-items:center;gap:14px;
    cursor:pointer;
    border-bottom:1px solid var(--line-soft);
    transition:background .15s ease;
  }
  .suggest .item:last-child{border-bottom:0}
  .suggest .item:hover, .suggest .item.active{
    background:var(--paper-2);
  }
  .suggest .item .pin{
    width:28px;height:28px;
    display:grid;place-items:center;
    color:var(--sakura-700);
    background:var(--sakura-100);
    border:1px solid var(--sakura-200);
    flex-shrink:0;
  }
  .suggest .item .info{display:flex;flex-direction:column;line-height:1.2;flex:1;min-width:0}
  .suggest .item .city{
    font-size:15px;font-weight:500;color:var(--ink);
  }
  .suggest .item .city mark{
    background:transparent;
    color:var(--indigo-700);
    font-weight:600;
  }
  .suggest .item .state{
    font-family:"JetBrains Mono",monospace;
    font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-mute);margin-top:3px;
  }
  .suggest .item .arrow{
    color:var(--ink-mute);
    opacity:0;transform:translateX(-4px);
    transition:opacity .2s, transform .2s, color .2s;
  }
  .suggest .item:hover .arrow, .suggest .item.active .arrow{
    opacity:1;transform:translateX(0);color:var(--indigo-700);
  }

  /* Selected city pill (replaces input) */
  .selected-city{
    display:none;
    align-items:center;justify-content:space-between;
    width:100%;height:64px;
    padding:0 18px 0 22px;
    border:1px solid var(--indigo-700);
    background:#fff;
    box-shadow: 0 12px 30px -16px rgba(15,26,61,.22), 0 0 0 4px rgba(31,50,115,.06);
  }
  .selected-city.show{display:flex;animation:rise .35s cubic-bezier(.2,.7,.2,1)}
  .selected-city .left{display:flex;align-items:center;gap:16px;min-width:0}
  .selected-city .pin{
    width:34px;height:34px;flex-shrink:0;
    display:grid;place-items:center;
    color:#fff;
    background:linear-gradient(135deg, var(--indigo-700), var(--sakura-700));
  }
  .selected-city .meta{display:flex;flex-direction:column;line-height:1.2;text-align:left}
  .selected-city .meta .lbl{
    font-family:"JetBrains Mono",monospace;
    font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--ink-mute);margin-bottom:3px;
  }
  .selected-city .meta .name{
    font-family:"Cormorant Garamond",serif;
    font-size:22px;font-weight:500;color:var(--ink);
    letter-spacing:-.005em;
  }
  .selected-city .meta .name .st{
    font-style:italic;color:var(--sakura-700);font-weight:400;margin-left:6px;
  }
  .selected-city .change{
    appearance:none;background:transparent;border:1px solid var(--line);
    padding:8px 14px;
    font:500 10.5px/1 "JetBrains Mono",monospace;
    letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-soft);cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    transition:color .2s, border-color .2s, background .2s;
  }
  .selected-city .change:hover{color:var(--ink);border-color:var(--ink);background:rgba(255,255,255,.6)}

  /* ========== SPECIALTIES PANEL ========== */
  .specialties{
    margin-top:22px;
    background:rgba(255,255,255,.65);
    border:1px solid var(--line);
    padding:24px 26px 22px;
    display:none;
    text-align:left;
    position:relative;
  }
  .specialties.show{display:block;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
  .specialties::before{
    content:"";position:absolute;
    top:-1px;left:0;right:0;height:2px;
    background:linear-gradient(90deg, var(--indigo-700), var(--sakura-700));
  }
  .spec-head{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:16px;margin-bottom:18px;
  }
  .spec-head .eyebrow{
    font-family:"JetBrains Mono",monospace;
    font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--indigo-600);
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
  }
  .spec-head .eyebrow .bar{width:24px;height:1px;background:var(--indigo-600)}
  .spec-head h2{
    font-family:"Cormorant Garamond",serif;
    font-weight:500;font-size:26px;line-height:1;margin:0;
    color:var(--ink);letter-spacing:-.005em;
  }
  .spec-head h2 .it{font-style:italic;color:var(--indigo-700);font-weight:400}
  .spec-head .count{
    font-family:"JetBrains Mono",monospace;
    font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-mute);
  }
  .spec-head .count b{color:var(--sakura-700);font-weight:500}

  .spec-tools{
    display:flex;gap:6px;margin-bottom:14px;
  }
  .spec-tools button{
    appearance:none;background:transparent;border:1px solid var(--line);
    padding:6px 12px;cursor:pointer;
    font:500 10px/1 "JetBrains Mono",monospace;
    letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-soft);
    transition:color .2s, border-color .2s;
  }
  .spec-tools button:hover{color:var(--ink);border-color:var(--ink)}

  .chips{
    display:flex;flex-wrap:wrap;gap:8px;
  }
  .chip{
    appearance:none;
    background:rgba(255,255,255,.5);
    border:1px solid var(--line);
    padding:10px 14px;
    font:500 13px/1 "DM Sans",sans-serif;
    color:var(--ink-soft);
    cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;
    transition:all .2s ease;
  }
  .chip:hover{color:var(--ink);border-color:var(--ink-soft);background:#fff}
  .chip .tick{
    width:14px;height:14px;
    border:1px solid var(--line);
    background:#fff;
    display:grid;place-items:center;
    flex-shrink:0;
    transition:all .2s;
  }
  .chip.selected{
    background:var(--indigo-900);
    border-color:var(--indigo-900);
    color:#fff;
  }
  .chip.selected .tick{
    background:#fff;border-color:#fff;
  }
  .chip.selected .tick::after{
    content:"";width:7px;height:3px;
    border-left:1.6px solid var(--indigo-900);
    border-bottom:1.6px solid var(--indigo-900);
    transform:rotate(-45deg) translateY(-1px);
  }

  .spec-foot{
    margin-top:22px;padding-top:18px;
    border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    gap:14px;
  }
  .spec-foot .summary{
    font-size:12.5px;color:var(--ink-soft);line-height:1.45;
  }
  .spec-foot .summary b{color:var(--ink);font-weight:600}
  .spec-foot .summary .none{color:var(--ink-mute);font-style:italic}
  .btn-search{
    appearance:none;border:0;cursor:pointer;
    height:48px;padding:0 24px;
    background:var(--indigo-900);color:#fff;
    font:500 12px/1 "DM Sans",sans-serif;
    letter-spacing:.22em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:12px;
    transition:background .2s, transform .2s, box-shadow .25s, opacity .2s;
    box-shadow:0 8px 22px -8px rgba(15,26,61,.4);
  }
  .btn-search:hover:not(:disabled){background:var(--indigo-700);box-shadow:0 12px 28px -8px rgba(15,26,61,.5)}
  .btn-search:active:not(:disabled){transform:translateY(1px)}
  .btn-search:disabled{opacity:.4;cursor:not-allowed}
  .btn-search svg{transition:transform .25s}
  .btn-search:hover:not(:disabled) svg{transform:translateX(4px)}

  /* ========== FOOTER ========== */
  footer.bot{
    position:fixed;bottom:0;left:0;right:0;
    z-index:1;
    padding:18px 32px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"JetBrains Mono",monospace;
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-mute);
  }
  footer.bot .kanji{
    color:var(--sakura-700);
    font-family:"Cormorant Garamond",serif;
    font-size:12px;letter-spacing:.32em;
  }

  @keyframes rise{to{opacity:1;transform:translateY(0)}}

  @media (max-width: 720px){
    .corner-tag{display:none}
    .user-chip{top:16px;right:16px}
    .logo-block img{width:140px;height:140px}
    .logo-block .wordmark{font-size:28px}
    .search input{height:58px;font-size:15px;padding-right:54px}
    .search .go{padding:0 14px;font-size:10px}
    .search .go .lbl{display:none}
    footer.bot{font-size:9px;padding:14px 18px}
  }
</style>
</head>
<body>

<!-- decorative sakura corners (reused style from login/admin) -->

</svg>

<svg class="deco br" viewBox="0 0 300 300" aria-hidden="true">
  <defs>
    <radialGradient id="b2" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fce0e6"/>
      <stop offset="100%" stop-color="#e891a9"/>
    </radialGradient>
  </defs>
  <path d="M -10 -10 C 40 30, 80 70, 120 100 C 160 120, 200 130, 240 132"
        stroke="#3a1820" stroke-width="2" fill="none" stroke-linecap="round" opacity=".5"/>
  <path d="M 70 50 C 85 70, 95 85, 110 95" stroke="#3a1820" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".45"/>
  <g>
    <g transform="translate(55 38) scale(.95)"><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(0)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(72)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(144)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(216)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(288)"/><circle r="1.5" fill="#a64668"/></g>
    <g transform="translate(100 82) scale(.78)"><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(20)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(92)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(164)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(236)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(308)"/><circle r="1.5" fill="#a64668"/></g>
    <g transform="translate(150 115) scale(.9)"><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(0)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(72)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(144)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(216)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(288)"/><circle r="1.5" fill="#a64668"/></g>
    <g transform="translate(200 128) scale(.66)"><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(10)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(82)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(154)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(226)"/><ellipse cx="0" cy="-7" rx="4.3" ry="6.2" fill="url(#b2)" transform="rotate(298)"/><circle r="1.5" fill="#a64668"/></g>
  </g>
</svg>

<!-- top corners -->
<div class="user-chip" id="user-chip" style="cursor:pointer" title="Clique para sair" onclick="logout()">
  <div class="av" id="chip-av">--</div>
  <div class="t">
    <span class="n" id="chip-name">Carregando…</span>
    <span class="r" id="chip-role">—</span>
  </div>
</div>

<!-- main -->
<main class="stage" data-screen-label="Busca">
  <div class="center">

    <div class="logo-block">
      <img src="assets/odin-logo.png" alt="ODIN" />
      <div class="wordmark">O<span>·</span>D<span>·</span>I<span>·</span>N</div>
      <div class="tagline">Observando Dados, Identificamos Novos prestadores</div>
    </div>

    <form class="search-wrap" onsubmit="event.preventDefault();" autocomplete="off">
      <div class="search" id="search-box">
        <span class="ico-left" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <input id="q" type="text" placeholder="Digite o nome de uma cidade…" autocomplete="off" autofocus />

        <!-- suggestions -->
        <div class="suggest" id="suggest" role="listbox"></div>
      </div>

      <!-- selected city pill (shown after picking) -->
      <div class="selected-city" id="selected-city">
        <div class="left">
          <span class="pin" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 22s-7-7.5-7-13a7 7 0 1 1 14 0c0 5.5-7 13-7 13Z"/><circle cx="12" cy="9" r="2.5"/></svg>
          </span>
          <div class="meta">
            <span class="lbl">Cidade selecionada</span>
            <span class="name" id="sel-name">—<span class="st" id="sel-state"></span></span>
          </div>
        </div>
        <button type="button" class="change" onclick="resetCity()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
          Trocar
        </button>
      </div>

      <!-- specialties panel -->
      <section class="specialties" id="specialties" aria-label="Especialidades">
        <div class="spec-head">
          <div>
            <div class="eyebrow"><span class="bar"></span> Passo 02</div>
            <h2>Selecione as <span class="it">especialidades.</span></h2>
          </div>
          <div class="count"><b id="sel-count">0</b> de <span id="spec-total">0</span> selecionadas</div>
        </div>

        <div class="spec-tools">
          <button type="button" onclick="selectAllSpecs(true)">Selecionar todas</button>
          <button type="button" onclick="selectAllSpecs(false)">Limpar</button>
        </div>

        <div class="chips" id="chips"></div>

        <div class="spec-foot">
          <div class="summary" id="summary">
            <span class="none">Nenhuma especialidade selecionada ainda.</span>
          </div>
          <button type="button" class="btn-search" id="btn-search" disabled onclick="doSearch()">
            Buscar prestadores
            <svg width="14" height="10" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 6h13M9 1l5 5-5 5"/></svg>
          </button>
        </div>
      </section>
    </form>

  </div>
</main>

<!-- results panel -->
<section id="results-panel" style="display:none;max-width:900px;margin:0 auto 48px;padding:0 24px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--ink);margin:0" id="results-title">Resultados</h2>
    <button onclick="resetSearch()" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--line);background:none;padding:6px 14px;cursor:pointer;color:var(--ink-mute)">Nova busca</button>
  </div>
  <div id="results-list"></div>
</section>

<footer class="bot">
  <span>© 2026 · Projeto Odin</span>
  <span class="kanji">探求 · Tankyū</span>
  <span></span>
</footer>

<script>
  /* ========== CONFIG ========== */
  const API_URL = 'https://odin-backend-v2.onrender.com';

  /* ========== AUTH ========== */
  (function checkAuth() {
    const token = localStorage.getItem('odin_token');
    if (!token) { window.location.href = 'login.html'; return; }
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      const initials = payload.username
        ? payload.username.split('.').map(p => p[0].toUpperCase()).join('').slice(0, 2)
        : '??';
      document.getElementById('chip-av').textContent   = initials;
      document.getElementById('chip-name').textContent = payload.username || 'Usuário';
      document.getElementById('chip-role').textContent =
        payload.role === 'master' ? 'Administrador' : 'Usuário';
    } catch(e) {
      localStorage.removeItem('odin_token');
      window.location.href = 'login.html';
    }
  })();

  function logout() {
    if (!confirm('Deseja encerrar a sessão?')) return;
    localStorage.removeItem('odin_token');
    window.location.href = 'login.html';
  }

  /* ========== CITIES ========== */
  const CITIES = [
    {name:"São Paulo", state:"SP"},{name:"Rio de Janeiro", state:"RJ"},
    {name:"Belo Horizonte", state:"MG"},{name:"Brasília", state:"DF"},
    {name:"Salvador", state:"BA"},{name:"Curitiba", state:"PR"},
    {name:"Fortaleza", state:"CE"},{name:"Recife", state:"PE"},
    {name:"Porto Alegre", state:"RS"},{name:"Manaus", state:"AM"},
    {name:"Belém", state:"PA"},{name:"Goiânia", state:"GO"},
    {name:"Campinas", state:"SP"},{name:"São Luís", state:"MA"},
    {name:"Maceió", state:"AL"},{name:"Natal", state:"RN"},
    {name:"Teresina", state:"PI"},{name:"João Pessoa", state:"PB"},
    {name:"Aracaju", state:"SE"},{name:"Cuiabá", state:"MT"},
    {name:"Campo Grande", state:"MS"},{name:"Florianópolis", state:"SC"},
    {name:"Vitória", state:"ES"},{name:"Porto Velho", state:"RO"},
    {name:"Rio Branco", state:"AC"},{name:"Boa Vista", state:"RR"},
    {name:"Macapá", state:"AP"},{name:"Palmas", state:"TO"},
    {name:"Santos", state:"SP"},{name:"Ribeirão Preto", state:"SP"},
    {name:"São José dos Campos", state:"SP"},{name:"Sorocaba", state:"SP"},
    {name:"São Bernardo do Campo", state:"SP"},{name:"Niterói", state:"RJ"},
    {name:"Petrópolis", state:"RJ"},{name:"Juiz de Fora", state:"MG"},
    {name:"Uberlândia", state:"MG"},{name:"Londrina", state:"PR"},
    {name:"Maringá", state:"PR"},{name:"Joinville", state:"SC"},
    {name:"Blumenau", state:"SC"},{name:"Caxias do Sul", state:"RS"},
    {name:"Pelotas", state:"RS"},
  ];

  /* ========== SPECIALTIES ========== */
  const SPECIALTIES = [
    "Clínica Geral","Cardiologia","Pediatria","Ginecologia","Ortopedia",
    "Oftalmologia","Dermatologia","Neurologia","Psiquiatria","Endocrinologia",
    "Otorrinolaringologia","Urologia","Gastroenterologia","Pneumologia",
    "Oncologia","Radiologia","Anestesiologia","Cirurgia Geral","Nutrição",
    "Fisioterapia","Psicologia","Odontologia",
  ];

  const SPEC_TO_TAG = {
    "Clínica Geral":        ["amenity","clinic"],
    "Cardiologia":          ["healthcare:speciality","cardiology"],
    "Pediatria":            ["healthcare:speciality","paediatrics"],
    "Ginecologia":          ["healthcare:speciality","gynaecology"],
    "Ortopedia":            ["healthcare:speciality","orthopaedics"],
    "Oftalmologia":         ["healthcare:speciality","ophthalmology"],
    "Dermatologia":         ["healthcare:speciality","dermatology"],
    "Neurologia":           ["healthcare:speciality","neurology"],
    "Psiquiatria":          ["healthcare:speciality","psychiatry"],
    "Endocrinologia":       ["healthcare:speciality","endocrinology"],
    "Otorrinolaringologia": ["healthcare:speciality","otolaryngology"],
    "Urologia":             ["healthcare:speciality","urology"],
    "Gastroenterologia":    ["healthcare:speciality","gastroenterology"],
    "Pneumologia":          ["healthcare:speciality","pulmonology"],
    "Oncologia":            ["healthcare:speciality","oncology"],
    "Radiologia":           ["healthcare:speciality","radiology"],
    "Anestesiologia":       ["healthcare:speciality","anaesthetics"],
    "Cirurgia Geral":       ["healthcare:speciality","surgery"],
    "Nutrição":             ["healthcare","nutritionist"],
    "Fisioterapia":         ["healthcare","physiotherapist"],
    "Psicologia":           ["healthcare","psychologist"],
    "Odontologia":          ["amenity","dentist"],
  };

  /* ========== STATE ========== */
  const $q           = document.getElementById("q");
  const $suggest     = document.getElementById("suggest");
  const $searchBox   = document.getElementById("search-box");
  const $selected    = document.getElementById("selected-city");
  const $specialties = document.getElementById("specialties");
  const $chips       = document.getElementById("chips");
  const $center      = document.querySelector(".center");
  const $summary     = document.getElementById("summary");
  const $btnSearch   = document.getElementById("btn-search");
  const $selCount    = document.getElementById("sel-count");
  const $specTotal   = document.getElementById("spec-total");
  const $results     = document.getElementById("results-panel");
  const $resultsList = document.getElementById("results-list");
  const $resultsTitle= document.getElementById("results-title");

  let selectedCity  = null;
  let selectedSpecs = new Set();
  let cursor = -1;

  /* ========== HELPERS ========== */
  const normalize = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();

  function highlight(text, term){
    if (!term) return text;
    const idx = normalize(text).indexOf(normalize(term));
    if (idx < 0) return text;
    return text.slice(0,idx)+"<mark>"+text.slice(idx,idx+term.length)+"</mark>"+text.slice(idx+term.length);
  }

  /* ========== SUGGESTIONS ========== */
  function renderSuggestions(){
    const term = $q.value.trim();
    if (!term){ $suggest.classList.remove("open"); $suggest.innerHTML=""; cursor=-1; return; }
    const q = normalize(term);
    const matches = CITIES.filter(c => normalize(c.name).includes(q)).slice(0,8);
    cursor = -1;
    if (!matches.length){
      $suggest.innerHTML = `<div class="empty">Nenhuma cidade encontrada para "${term}".</div>`;
    } else {
      $suggest.innerHTML =
        `<div class="s-head">${matches.length} ${matches.length===1?"cidade":"cidades"} encontrada${matches.length===1?"":"s"}</div>`+
        matches.map((c,i)=>`
          <div class="item" role="option" data-i="${i}" data-name="${c.name}" data-state="${c.state}">
            <span class="pin"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 22s-7-7.5-7-13a7 7 0 1 1 14 0c0 5.5-7 13-7 13Z"/><circle cx="12" cy="9" r="2.5"/></svg></span>
            <div class="info"><span class="city">${highlight(c.name,term)}</span><span class="state">${c.state} · Brasil</span></div>
            <span class="arrow"><svg width="14" height="10" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 6h13M9 1l5 5-5 5"/></svg></span>
          </div>`).join("");
      $suggest.querySelectorAll(".item").forEach(el=>{
        el.addEventListener("click",()=>selectCity(el.dataset.name,el.dataset.state));
        el.addEventListener("mouseenter",()=>{
          $suggest.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
          el.classList.add("active"); cursor=parseInt(el.dataset.i,10);
        });
      });
    }
    $suggest.classList.add("open");
  }

  $q.addEventListener("input",renderSuggestions);
  $q.addEventListener("focus",()=>{ if($q.value.trim()) renderSuggestions(); });
  document.addEventListener("click",e=>{ if(!$searchBox.contains(e.target)) $suggest.classList.remove("open"); });
  $q.addEventListener("keydown",e=>{
    const items=$suggest.querySelectorAll(".item");
    if(!items.length) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); cursor=(cursor+1)%items.length; items.forEach(x=>x.classList.remove("active")); items[cursor].classList.add("active"); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); cursor=(cursor-1+items.length)%items.length; items.forEach(x=>x.classList.remove("active")); items[cursor].classList.add("active"); }
    else if(e.key==="Enter"){ e.preventDefault(); const t=cursor>=0?items[cursor]:items[0]; if(t) selectCity(t.dataset.name,t.dataset.state); }
    else if(e.key==="Escape") $suggest.classList.remove("open");
  });

  /* ========== CITY SELECTION ========== */
  function selectCity(name,state){
    selectedCity={name,state};
    $suggest.classList.remove("open");
    $searchBox.style.display="none";
    $selected.classList.add("show");
    document.getElementById("sel-name").firstChild.textContent=name;
    document.getElementById("sel-state").textContent="— "+state;
    $center.classList.add("expanded");
    renderSpecialties();
    $specialties.classList.add("show");
  }

  function resetCity(){
    selectedCity=null; selectedSpecs.clear();
    $selected.classList.remove("show"); $specialties.classList.remove("show");
    $searchBox.style.display=""; $center.classList.remove("expanded");
    $q.value=""; setTimeout(()=>$q.focus(),50);
  }

  /* ========== SPECIALTIES ========== */
  function renderSpecialties(){
    $specTotal.textContent=SPECIALTIES.length;
    $chips.innerHTML=SPECIALTIES.map(s=>`
      <button type="button" class="chip${selectedSpecs.has(s)?" selected":""}" data-spec="${s}">
        <span class="tick"></span>${s}
      </button>`).join("");
    $chips.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>toggleSpec(c.dataset.spec)));
    updateSummary();
  }

  function toggleSpec(name){ if(selectedSpecs.has(name)) selectedSpecs.delete(name); else selectedSpecs.add(name); renderSpecialties(); }
  function selectAllSpecs(all){ selectedSpecs.clear(); if(all) SPECIALTIES.forEach(s=>selectedSpecs.add(s)); renderSpecialties(); }

  function updateSummary(){
    const n=selectedSpecs.size; $selCount.textContent=n;
    if(!n){ $summary.innerHTML=`<span class="none">Nenhuma especialidade selecionada ainda.</span>`; $btnSearch.disabled=true; return; }
    const list=[...selectedSpecs], shown=list.slice(0,3).join(", "), more=list.length>3?` <b>+${list.length-3}</b>`:"";
    $summary.innerHTML=`Buscando <b>${n}</b> ${n===1?"especialidade":"especialidades"} em <b>${selectedCity.name} · ${selectedCity.state}</b><br/><span style="color:var(--ink-mute);font-size:11.5px">${shown}${more}</span>`;
    $btnSearch.disabled=false;
  }

  /* ========== SEARCH ========== */
  async function doSearch(){
    if(!selectedCity||!selectedSpecs.size) return;
    $btnSearch.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Buscando…`;
    $btnSearch.disabled=true;
    const token=localStorage.getItem('odin_token');

    try {
      // 1. Geocodificar via Nominatim
      const geoRes=await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(selectedCity.name+', '+selectedCity.state+', Brasil')}&format=json&limit=1`,
        {headers:{'Accept-Language':'pt-BR'}}
      );
      const geo=await geoRes.json();
      if(!geo.length) throw new Error('Cidade não encontrada no mapa.');
      const [s,n,w,e]=geo[0].boundingbox.map(Number);

      // 2. Montar query Overpass
      const parts=[...selectedSpecs].flatMap(spec=>{
        const [k,v]=SPEC_TO_TAG[spec]||["healthcare","yes"];
        return [`node["${k}"="${v}"](${s},${w},${n},${e});`,`way["${k}"="${v}"](${s},${w},${n},${e});`];
      }).join('\n');
      const query=`[out:json][timeout:25];\n(\n${parts}\n);\nout center 50;`;

      const ovRes=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(query)});
      const ovData=await ovRes.json();
      const elements=ovData.elements||[];

      // 3. Log no backend (fire-and-forget — não quebra se a rota não existir)
      if(token){
        fetch(`${API_URL}/api/search/log`,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body:JSON.stringify({city:selectedCity.name,state:selectedCity.state,specialties:[...selectedSpecs],resultCount:elements.length})
        }).catch(()=>{});
      }

      // 4. Mostrar resultados
      renderResults(elements);

    } catch(err){
      $btnSearch.innerHTML=`Buscar prestadores <svg width="14" height="10" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 6h13M9 1l5 5-5 5"/></svg>`;
      $btnSearch.disabled=false;
      $resultsList.innerHTML=`<p style="color:#b4546b;font-size:14px;">Erro na busca: ${err.message}</p>`;
      $results.style.display='block';
    }
  }

  function renderResults(elements){
    const count=elements.length;
    $resultsTitle.textContent=`${count} prestador${count!==1?'es':''} encontrado${count!==1?'s':''} em ${selectedCity.name} · ${selectedCity.state}`;
    $results.style.display='block';
    document.querySelector('.stage').style.display='none';
    if(!count){
      $resultsList.innerHTML=`<p style="color:var(--ink-mute);font-size:14px;text-align:center;padding:32px 0">Nenhum prestador encontrado para as especialidades selecionadas.<br><small>Tente outras especialidades ou uma cidade maior.</small></p>`;
      return;
    }
    $resultsList.innerHTML=elements.map(el=>{
      const t=el.tags||{};
      const name=t.name||t['name:pt']||'Prestador sem nome cadastrado';
      const addr=[t['addr:street'],t['addr:housenumber'],t['addr:suburb']].filter(Boolean).join(', ')||'—';
      const phone=t.phone||t['contact:phone']||'—';
      const spec=t['healthcare:speciality']||t.healthcare||t.amenity||'—';
      return `<div style="border:1px solid var(--line);padding:18px 22px;margin-bottom:12px;background:#fff;display:flex;justify-content:space-between;align-items:flex-start;gap:16px">
        <div>
          <div style="font-weight:500;font-size:15px;color:var(--ink);margin-bottom:4px">${name}</div>
          <div style="font-size:12px;color:var(--ink-mute);margin-bottom:2px">📍 ${addr}</div>
          <div style="font-size:12px;color:var(--ink-mute)">📞 ${phone}</div>
        </div>
        <span style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;background:var(--sakura-100);color:var(--sakura-700);border:1px solid var(--sakura-200);padding:4px 10px;white-space:nowrap">${spec}</span>
      </div>`;
    }).join('');
  }

  function resetSearch(){
    $results.style.display='none';
    document.querySelector('.stage').style.display='';
    $btnSearch.innerHTML=`Buscar prestadores <svg width="14" height="10" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 6h13M9 1l5 5-5 5"/></svg>`;
    $btnSearch.disabled=false;
    resetCity();
  }

  document.addEventListener("keydown",e=>{
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){
      e.preventDefault(); if(selectedCity) resetCity(); else { $q.focus(); $q.select(); }
    }
  });
</script>
</body>
</html>
